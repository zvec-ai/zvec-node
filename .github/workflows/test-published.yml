name: Test Published Package

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-published:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Debug Environment
        run: node -p "process.platform + ' ' + process.arch"

      - name: Install Dependencies
        run: npm install --no-package-lock

      - name: Patch Test Imports
        run: node scripts/patch-imports.js tests @zvec/zvec

      - name: Install Latest Zvec (Unix)
        if: runner.os != 'Windows'
        run: |
          rm -rf node_modules/@zvec
          npm install @zvec/zvec@latest

      - name: Install Latest Zvec (Windows)
        if: runner.os == 'Windows'
        run: |
          Remove-Item -Recurse -Force node_modules\@zvec -ErrorAction SilentlyContinue
          npm install @zvec/zvec@latest

      - name: Verify Installed Version
        run: npm ls @zvec/zvec

      - name: Run Unit Tests
        run: npm run test:unit
