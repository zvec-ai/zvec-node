name: Test Latest Source

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-source:
    runs-on: ubuntu-latest

    steps:
      - name: Check CPU Info
        run: lscpu

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install Dependencies
        run: npm install

      - name: Build Binaries
        run: npm run dev

      - name: Run Unit Tests
        run: npm run test:unit
